name: YouTube Auto Uploader

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: uploader
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Get code, run uploader, save progress
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" repo
          cd repo
          git config user.name "uploader-bot"
          git config user.email "actions@users.noreply.github.com"
          echo '' | base64 -d > _sanitize.py
          python3 _sanitize.py
          rm -f _sanitize.py
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          printf '%s' "$GOOGLE_CLIENT_SECRET" > client_secret.json
          printf '%s' "$GDRIVE_TOKEN" > token.json
          python3 run_once.py
          git add state.json || true
          git commit -m "update progress $(date -u +%FT%TZ)" || echo "no changes"
          git push origin HEAD:main || echo "nothing to push"
